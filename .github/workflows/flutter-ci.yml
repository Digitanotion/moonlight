name: Flutter CI/CD Pipeline

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "**/*.md"
      - "**/*.txt"
      - ".github/**"
      - "**/*.png"
      - "**/*.jpg"
      - "**/*.svg"

  pull_request:
    branches: [main, master]

  workflow_dispatch:
    inputs:
      deploy_track:
        description: "Play Store Deployment Track"
        required: true
        default: "production"
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      version_bump:
        description: "Bump Version?"
        required: true
        default: "patch"
        type: choice
        options:
          - none
          - patch
          - minor
          - major

env:
  PROJECT_PATH: "."
  FLUTTER_VERSION: "3.32.7"

jobs:
  # JOB 1: TESTING — only runs on push/PR, skipped on workflow_dispatch
  test:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter test --coverage

  # JOB 2: BUILD AAB
  # FIX 1: removed `needs: [test]` — test is skipped on workflow_dispatch,
  #         so depending on it caused build-aab to be skipped too.
  # FIX 2: build.gradle → build.gradle.kts (your project uses .kts format)
  # FIX 3: version grep/sed updated for .kts syntax (uses = not space)
  build-aab:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    outputs:
      version_code: ${{ steps.get_version.outputs.code }}
      version_name: ${{ steps.get_version.outputs.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Auto-bump version (if requested)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version_bump != 'none'
        run: |
          CURRENT=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          NAME=$(echo $CURRENT | cut -d'+' -f1)
          CODE=$(echo $CURRENT | cut -d'+' -f2)
          NEW_CODE=$((CODE + 1))
          # bump patch in version name too
          MAJOR=$(echo $NAME | cut -d'.' -f1)
          MINOR=$(echo $NAME | cut -d'.' -f2)
          PATCH=$(echo $NAME | cut -d'.' -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_NAME="$MAJOR.$MINOR.$NEW_PATCH"
          # update pubspec.yaml
          sed -i "s/^version: .*/version: $NEW_NAME+$NEW_CODE/" pubspec.yaml
          # update local.properties
          sed -i "s/flutter.versionCode=.*/flutter.versionCode=$NEW_CODE/" local.properties
          sed -i "s/flutter.versionName=.*/flutter.versionName=$NEW_NAME/" local.properties
          echo "✅ Bumped from $CURRENT to $NEW_NAME+$NEW_CODE"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Get Version Info
        id: get_version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          VERSION_NAME=$(echo $VERSION | cut -d'+' -f1)
          VERSION_CODE=$(echo $VERSION | cut -d'+' -f2)
          echo "code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "📱 Version: $VERSION_NAME ($VERSION_CODE)"

      - name: Decode Keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.ANDROID_UPLOAD_KEYSTORE }}" | base64 --decode > android/app/upload-keystore.jks
          echo "✅ Keystore decoded"

      - name: Build App Bundle (AAB)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "🚀 Building Android App Bundle..."
          flutter build appbundle --release
          echo "✅ AAB built successfully!"
          ls -lh build/app/outputs/bundle/release/

      - name: Verify MEDIA_PROJECTION removed
        run: |
          MANIFEST="build/app/intermediates/merged_manifests/release/AndroidManifest.xml"
          if [ ! -f "$MANIFEST" ]; then
            echo "⚠️  Merged manifest not found at expected path — searching..."
            find build/ -name "AndroidManifest.xml" 2>/dev/null | head -5
          elif grep -q "MEDIA_PROJECTION" "$MANIFEST"; then
            echo "❌ MEDIA_PROJECTION still present!"
            grep "MEDIA_PROJECTION" "$MANIFEST"
            exit 1
          else
            echo "✅ MEDIA_PROJECTION successfully removed"
          fi

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle-v${{ steps.get_version.outputs.code }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  # JOB 3: DEPLOY TO PLAY STORE
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs: [build-aab]

    steps:
      - name: Download AAB Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-bundle-v${{ needs.build-aab.outputs.version_code }}

      - name: Determine Deployment Track
        id: track
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TRACK="${{ github.event.inputs.deploy_track }}"
          else
            TRACK="internal"
          fi
          echo "track=$TRACK" >> $GITHUB_OUTPUT
          echo "🎯 Deployment track: $TRACK"

      - name: Deploy to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          packageName: "com.app.moonlightstream"
          releaseFiles: app-release.aab
          track: ${{ steps.track.outputs.track }}
          status: draft

      - name: Create Deployment Summary
        if: success()
        run: |
          echo "🎉 DEPLOYMENT SUCCESSFUL!" > summary.md
          echo "=======================" >> summary.md
          echo "" >> summary.md
          echo "**App:** Moonlight Livestream" >> summary.md
          echo "**Version:** ${{ needs.build-aab.outputs.version_name }} (${{ needs.build-aab.outputs.version_code }})" >> summary.md
          echo "**Track:** ${{ steps.track.outputs.track }}" >> summary.md
          echo "**Time:** $(date)" >> summary.md
          echo "" >> summary.md
          echo "**Next Steps:**" >> summary.md
          echo "1. Go to [Play Console](https://play.google.com/console)" >> summary.md
          echo "2. Navigate to the production track" >> summary.md
          echo "3. Review the uploaded release" >> summary.md
          echo "4. Click 'Start rollout'" >> summary.md

      - name: Upload Deployment Summary
        uses: actions/upload-artifact@v4
        with:
          name: deployment-summary
          path: summary.md
          retention-days: 7
